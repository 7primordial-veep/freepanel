##
# Compression Settings (gzip lives in nginx.conf for legacy reasons;
# brotli + zstd are split out so install.sh can disable the include if
# the host's nginx build is missing the modules).
##

# --- Brotli ---------------------------------------------------------------
# Requires libnginx-mod-brotli (Debian/Ubuntu) or nginx-extras.
brotli on;
brotli_static on;
brotli_comp_level 5;
brotli_min_length 256;
brotli_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/wasm
    application/x-font-ttf
    application/x-javascript
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    application/xml+rss
    font/eot
    font/opentype
    font/otf
    font/ttf
    image/bmp
    image/svg+xml
    image/vnd.microsoft.icon
    image/x-icon
    text/cache-manifest
    text/css
    text/javascript
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy
    text/xml;

# --- Zstd -----------------------------------------------------------------
# Requires libnginx-mod-zstd. Safe to leave even if no client negotiates it.
zstd on;
zstd_static on;
zstd_comp_level 6;
zstd_min_length 256;
zstd_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/wasm
    application/x-javascript
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;
