[clp]
listen = /run/clp-php-fpm.sock
user = clp
group = clp
listen.owner = clp
listen.group = clp
listen.mode = 0660
pm = ondemand
pm.max_children = 25
pm.process_idle_timeout = 10s
pm.max_requests = 100
pm.process_idle_timeout = 30s
listen.backlog = 65535
pm.status_path = /status
request_terminate_timeout = 7200s
rlimit_files = 131072
rlimit_core = unlimited
catch_workers_output = yes