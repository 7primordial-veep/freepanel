[clp-file-manager]
listen = /run/clp-fm-php-fpm.sock
user = root
group = clp
listen.owner = root
listen.group = clp
listen.mode = 0660
pm = ondemand
pm.max_children = 25
pm.max_requests = 100
pm.process_idle_timeout = 30s
listen.backlog = 65535
pm.status_path = /status
request_terminate_timeout = 7200s
rlimit_files = 131072
rlimit_core = unlimited
catch_workers_output = yes